spring:
  application:
    name: vesttrack-pro

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vesttrack}
    username: ${DB_USER:vesttrack}
    password: ${DB_PASSWORD:vesttrack_dev_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate     # schemat tworzony wylacznie przez Flyway
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 30
        default_batch_fetch_size: 30

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=2000,expireAfterWrite=15m

  # --- Konfiguracja poczty wychodzacej ---
  # Uzywana do: e-maila powitalnego po rejestracji oraz linku resetujacego haslo.
  # W dev/test mozesz zamiast prawdziwego SMTP uzyc Mailtrap.io (darmowy "fake" SMTP
  # do testow - maile nie wychodza naprawde, tylko trafiaja do skrzynki testowej Mailtrap).
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
        transport:
          protocol: smtp

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-change-in-prod-32-bytes-min!!}
  expiration-minutes: 60
  refresh-expiration-days: 7
  refresh-cookie-name: vesttrack_refresh_token

app:
  mail:
    from: ${MAIL_FROM:no-reply@vesttrack.pro}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  password-reset:
    token-expiration-minutes: 30

external-api:
  nbp:
    base-url: ${NBP_API_BASE_URL:https://api.nbp.pl/api}
  quotes:
    # Podstawowy dostawca notowan - Yahoo Finance (nieoficjalne, publiczne endpointy query1/query2)
    yahoo-base-url: ${YAHOO_API_BASE_URL:https://query1.finance.yahoo.com}
    # Dostawca zapasowy - Alpha Vantage (wymaga darmowego klucza API: https://www.alphavantage.co/support/#api-key)
    alphavantage-base-url: ${ALPHAVANTAGE_API_BASE_URL:https://www.alphavantage.co}
    alphavantage-api-key: ${ALPHAVANTAGE_API_KEY:demo}

resilience4j:
  circuitbreaker:
    instances:
      yahooQuotes:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      alphaVantageQuotes:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
  retry:
    instances:
      yahooQuotes:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      alphaVantageQuotes:
        max-attempts: 2
        wait-duration: 500ms

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    com.vesttrack: INFO
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:vesttrack}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/vesttrack_test
