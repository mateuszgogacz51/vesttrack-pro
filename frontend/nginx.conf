server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy wszystkich wywolan API do kontenera backendu.
    # Frontend w przegladarce zawsze woła wzgledny "/api/..." - nginx
    # przekierowuje to do wewnetrznego serwisu "app" (Spring Boot), dzieki czemu
    # unikamy problemow z CORS (przegladarka widzi tylko jedno pochodzenie).
    location /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI backendu - wygodny dostep tez przez frontend origin
    location /swagger-ui/ {
        proxy_pass http://app:8080/swagger-ui/;
    }
    location /v3/api-docs {
        proxy_pass http://app:8080/v3/api-docs;
    }

    # Single Page Application - kazda nieznaleziona sciezka wraca do index.html,
    # zeby React Router mogl przejac routing po stronie klienta.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
